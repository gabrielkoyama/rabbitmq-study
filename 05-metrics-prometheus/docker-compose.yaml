name: 'prometheus-metrics'

services:

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  consumer:
    build: ./consumer
    depends_on:
      - rabbitmq
    ports:
      - "8000:8000"
    environment:
      - RABBITMQ_HOST=rabbitmq

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus